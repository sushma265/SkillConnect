# SkillConnect – Docker Compose
# ===============================
# Local development with MongoDB and the Flask app.

version: "3.9"

services:
  # ── Flask Application ────────────────────────────────────────────────
  app:
    build: .
    container_name: skillconnect-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/skillconnect
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-dev-secret}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=http://localhost:5000/auth/google/callback
      - FRONTEND_URL=http://localhost:5000
    volumes:
      - .:/app
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    command: >
      python run.py

  # ── MongoDB ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: skillconnect-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo-data:
  uploads: