{% extends "base.html" %}
{% block title %}Admin Panel – SkillConnect{% endblock %}

{% block content %}
<section class="py-5 mt-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">Admin Panel</h1>
                <p class="text-secondary mb-0">Platform management and oversight</p>
            </div>
        </div>

        <!-- Admin Tabs -->
        <ul class="nav nav-pills sc-dash-tabs mb-4" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#adminUsers" onclick="loadAdminUsers()"><i class="bi bi-people me-1"></i>Users</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#adminEvents" onclick="loadAdminEvents()"><i class="bi bi-calendar-event me-1"></i>Events</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#adminAnalytics" onclick="loadAdminAnalytics()"><i class="bi bi-bar-chart me-1"></i>Analytics</button></li>
        </ul>

        <div class="tab-content">
            <!-- Users Tab -->
            <div class="tab-pane fade show active" id="adminUsers">
                <div class="d-flex gap-2 mb-3">
                    <button class="btn btn-outline-primary btn-sm active" onclick="filterAdminUsers('all', this)">All</button>
                    <button class="btn btn-outline-primary btn-sm" onclick="filterAdminUsers('attendee', this)">Attendees</button>
                    <button class="btn btn-outline-primary btn-sm" onclick="filterAdminUsers('organizer', this)">Organizers</button>
                    <button class="btn btn-outline-primary btn-sm" onclick="filterAdminUsers('admin', this)">Admins</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark table-hover sc-table">
                        <thead>
                            <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Events Tab -->
            <div class="tab-pane fade" id="adminEvents">
                <div class="table-responsive">
                    <table class="table table-dark table-hover sc-table">
                        <thead>
                            <tr><th>Title</th><th>Type</th><th>Date</th><th>Registrations</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="adminEventsBody">
                            <tr><td colspan="5" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Analytics Tab -->
            <div class="tab-pane fade" id="adminAnalytics">
                <div id="adminAnalyticsContent">
                    <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const user = JSON.parse(localStorage.getItem('sc_user') || '{}');
    if (user.role !== 'admin') { window.location.href = '/dashboard'; return; }
    loadAdminUsers();
});

function getHeaders() {
    return {'Authorization': `Bearer ${localStorage.getItem('sc_token')}`, 'Content-Type': 'application/json'};
}

async function loadAdminUsers(role) {
    const url = role && role !== 'all' ? `/admin/users?role=${role}` : '/admin/users';
    try {
        const res = await fetch(url, {headers: getHeaders()});
        const data = await res.json();
        const users = data.users || [];
        document.getElementById('usersTableBody').innerHTML = users.map(u => `
            <tr>
                <td><div class="d-flex align-items-center gap-2"><span class="sc-avatar-sm">${(u.name||'U')[0]}</span>${u.name}</div></td>
                <td class="text-secondary">${u.email}</td>
                <td><span class="badge ${u.role === 'admin' ? 'bg-danger' : u.role === 'organizer' ? 'bg-primary' : 'bg-secondary'}">${u.role}</span></td>
                <td><span class="badge ${u.is_active ? 'bg-success' : 'bg-danger'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                <td class="text-secondary small">${new Date(u.created_at).toLocaleDateString()}</td>
                <td>
                    <div class="d-flex gap-1">
                        <button class="btn btn-outline-warning btn-sm" onclick="toggleActive('${u.id}')" title="Toggle active"><i class="bi bi-toggle-on"></i></button>
                        ${u.role === 'attendee' ? '<button class="btn btn-outline-primary btn-sm" onclick="promoteUser(\''+u.id+'\')" title="Promote to organizer"><i class="bi bi-arrow-up-circle"></i></button>' : ''}
                        ${u.role === 'organizer' ? '<button class="btn btn-outline-secondary btn-sm" onclick="demoteUser(\''+u.id+'\')" title="Demote to attendee"><i class="bi bi-arrow-down-circle"></i></button>' : ''}
                    </div>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="6" class="text-center text-secondary">No users found.</td></tr>';
    } catch(e) { document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="6" class="text-danger">Failed to load users.</td></tr>'; }
}

function filterAdminUsers(role, btn) {
    document.querySelectorAll('.btn-outline-primary').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadAdminUsers(role);
}

async function toggleActive(userId) {
    try {
        const res = await fetch(`/admin/users/${userId}/toggle-active`, {method: 'PUT', headers: getHeaders()});
        const data = await res.json();
        showToast(data.message, res.ok ? 'success' : 'danger');
        if (res.ok) loadAdminUsers();
    } catch(e) { showToast('Failed', 'danger'); }
}

async function promoteUser(userId) {
    try {
        const res = await fetch('/admin/promote-organizer', {method: 'PUT', headers: getHeaders(), body: JSON.stringify({user_id: userId})});
        const data = await res.json();
        showToast(data.message, res.ok ? 'success' : 'danger');
        if (res.ok) loadAdminUsers();
    } catch(e) { showToast('Failed', 'danger'); }
}

async function demoteUser(userId) {
    try {
        const res = await fetch('/admin/demote-user', {method: 'PUT', headers: getHeaders(), body: JSON.stringify({user_id: userId})});
        const data = await res.json();
        showToast(data.message, res.ok ? 'success' : 'danger');
        if (res.ok) loadAdminUsers();
    } catch(e) { showToast('Failed', 'danger'); }
}

async function loadAdminEvents() {
    try {
        const res = await fetch('/admin/events', {headers: getHeaders()});
        const data = await res.json();
        const events = data.events || [];
        document.getElementById('adminEventsBody').innerHTML = events.map(e => `
            <tr>
                <td>${e.title}</td>
                <td><span class="badge bg-dark">${e.event_type}</span></td>
                <td class="text-secondary">${new Date(e.event_date).toLocaleDateString()}</td>
                <td>${e.registered_count || 0}/${e.capacity}</td>
                <td>
                    <button class="btn btn-outline-danger btn-sm" onclick="adminDeleteEvent('${e.id}')"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="5" class="text-center text-secondary">No events.</td></tr>';
    } catch(e) { document.getElementById('adminEventsBody').innerHTML = '<tr><td colspan="5" class="text-danger">Failed to load events.</td></tr>'; }
}

async function adminDeleteEvent(eventId) {
    if (!confirm('Delete this event? This action cannot be undone.')) return;
    try {
        const res = await fetch(`/admin/events/${eventId}`, {method: 'DELETE', headers: getHeaders()});
        const data = await res.json();
        showToast(data.message, res.ok ? 'success' : 'danger');
        if (res.ok) loadAdminEvents();
    } catch(e) { showToast('Failed', 'danger'); }
}

async function loadAdminAnalytics() {
    try {
        const res = await fetch('/admin/analytics', {headers: getHeaders()});
        const data = await res.json();
        document.getElementById('adminAnalyticsContent').innerHTML = `
            <div class="row g-3">
                <div class="col-md-3"><div class="sc-dash-stat text-center"><span class="sc-dash-stat-val">${data.users?.total || 0}</span><span class="sc-dash-stat-label">Users</span></div></div>
                <div class="col-md-3"><div class="sc-dash-stat text-center"><span class="sc-dash-stat-val">${data.events?.total || 0}</span><span class="sc-dash-stat-label">Events</span></div></div>
                <div class="col-md-3"><div class="sc-dash-stat text-center"><span class="sc-dash-stat-val">${data.registrations?.total || 0}</span><span class="sc-dash-stat-label">Registrations</span></div></div>
                <div class="col-md-3"><div class="sc-dash-stat text-center"><span class="sc-dash-stat-val">${data.feedback?.average_rating || '–'} ★</span><span class="sc-dash-stat-label">Avg Rating</span></div></div>
            </div>
            <div class="row g-3 mt-3">
                <div class="col-md-3"><div class="sc-dash-stat text-center"><span class="sc-dash-stat-val">${data.qa?.total_questions || 0}</span><span class="sc-dash-stat-label">Questions</span></div></div>
                <div class="col-md-3"><div class="sc-dash-stat text-center"><span class="sc-dash-stat-val">${data.polls?.total_votes || 0}</span><span class="sc-dash-stat-label">Poll Votes</span></div></div>
                <div class="col-md-3"><div class="sc-dash-stat text-center"><span class="sc-dash-stat-val">${data.networking?.total_connections || 0}</span><span class="sc-dash-stat-label">Connections</span></div></div>
                <div class="col-md-3"><div class="sc-dash-stat text-center"><span class="sc-dash-stat-val">${data.registrations?.attendance_rate || 0}%</span><span class="sc-dash-stat-label">Attendance</span></div></div>
            </div>
        `;
    } catch(e) { document.getElementById('adminAnalyticsContent').innerHTML = '<p class="text-danger">Failed to load analytics.</p>'; }
}
</script>
{% endblock %}
