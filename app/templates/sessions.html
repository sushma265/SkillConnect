{% extends "base.html" %}
{% block title %}Sessions – SkillConnect{% endblock %}

{% block content %}
<section class="py-5 mt-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h1 class="h3 mb-1">All Sessions</h1>
                <p class="text-secondary mb-0">Keynotes, panels, workshops, and more</p>
            </div>
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-outline-primary btn-sm active" onclick="filterSessions('all', this)">All</button>
                <button type="button" class="btn btn-outline-primary btn-sm" onclick="filterSessions('keynote', this)">Keynotes</button>
                <button type="button" class="btn btn-outline-primary btn-sm" onclick="filterSessions('panel', this)">Panels</button>
                <button type="button" class="btn btn-outline-primary btn-sm" onclick="filterSessions('workshop', this)">Workshops</button>
            </div>
        </div>

        <div class="row g-3" id="sessionsGrid">
            <div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>
        </div>
    </div>
</section>

<script>
let allSessions = [];

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/sessions');
        const data = await res.json();
        allSessions = data.sessions || [];
        renderSessions(allSessions);
    } catch(e) {
        document.getElementById('sessionsGrid').innerHTML = '<div class="col-12 text-center py-5"><p class="text-danger">Failed to load sessions.</p></div>';
    }
});

function filterSessions(type, btn) {
    document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = type === 'all' ? allSessions : allSessions.filter(s => s.session_type === type);
    renderSessions(filtered);
}

function renderSessions(sessions) {
    const grid = document.getElementById('sessionsGrid');
    if (!sessions.length) {
        grid.innerHTML = '<div class="col-12 text-center py-5"><i class="bi bi-collection text-secondary" style="font-size:3rem"></i><p class="text-secondary mt-2">No sessions found.</p></div>';
        return;
    }
    grid.innerHTML = sessions.map(s => `
        <div class="col-lg-6">
            <div class="sc-session-card">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <span class="badge bg-primary bg-opacity-25 text-primary">${s.session_type}</span>
                            ${s.is_live ? '<span class="badge bg-danger"><i class="bi bi-broadcast me-1"></i>LIVE</span>' : ''}
                        </div>
                        <h6 class="mb-1">${s.title}</h6>
                        ${s.speaker_name ? '<p class="small text-secondary mb-1"><i class="bi bi-person me-1"></i>' + s.speaker_name + '</p>' : ''}
                        ${s.description ? '<p class="small text-secondary mb-2">' + (s.description || '').substring(0, 120) + '</p>' : ''}
                        <div class="d-flex gap-3 small text-secondary">
                            <span><i class="bi bi-clock me-1"></i>${new Date(s.starts_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} – ${new Date(s.ends_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
                            ${s.room ? '<span><i class="bi bi-geo me-1"></i>' + s.room + '</span>' : ''}
                        </div>
                    </div>
                    <div class="d-flex flex-column gap-1 text-end">
                        <span class="badge bg-dark"><i class="bi bi-chat-dots me-1"></i>${s.questions_count} Q&A</span>
                        <span class="badge bg-dark"><i class="bi bi-bar-chart me-1"></i>${s.polls_count} Polls</span>
                        <span class="badge bg-dark"><i class="bi bi-file-earmark me-1"></i>${s.materials_count} Files</span>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}
</script>
{% endblock %}
