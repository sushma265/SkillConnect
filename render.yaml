# SkillConnect – Render Deployment Blueprint
# =============================================
# Deploy to render.com with a single web service.
# Set environment variables in the Render dashboard.

services:
  - type: web
    name: skillconnect
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --worker-class eventlet -w 1 --timeout 120 --keep-alive 5
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: METERED_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.7"
